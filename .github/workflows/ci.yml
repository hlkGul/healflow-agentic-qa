name: Agentic QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  e2e-test:
    name: E2E Test (Self-Healing)
    runs-on: ubuntu-latest
    needs: type-check
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E test from criteria file
        run: npx tsx src/index.ts --file criteria/search-elbise.md

      - name: Verify generated artifacts
        run: |
          echo "=== Generated Test ==="
          cat tests/generated/*.spec.ts
          echo ""
          echo "=== Feature File ==="
          cat features/*.feature
          echo ""
          echo "=== Step Definitions ==="
          cat src/step-definitions/*.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            tests/generated/
            features/
            src/step-definitions/
            criteria/
            healing-history.json
            test-results/
          retention-days: 7

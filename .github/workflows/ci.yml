name: Agentic QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  e2e-test:
    name: E2E Tests + Self-Healing
    runs-on: ubuntu-latest
    needs: type-check
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TEST_ENV: ${{ vars.TEST_ENV || 'prod' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Cucumber tests (with self-healing)
        run: npx tsx src/ci-runner.ts

      - name: Create PR with healed locators
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            BRANCH_NAME="fix/auto-heal-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git add src/step-definitions/ healing-history.json
            git commit -m "fix(auto): self-healed locators via CI pipeline

          Locators were automatically fixed by the Healer agent.
          See healing-history.json for details.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin "$BRANCH_NAME"
            
            # Create PR via REST API
            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls \
              -d "{
                \"title\": \"fix(auto): Self-healed broken locators\",
                \"head\": \"$BRANCH_NAME\",
                \"base\": \"main\",
                \"body\": \"## 🔧 Auto-Healed Locators\n\nThe CI pipeline detected broken locators and the Healer agent fixed them automatically.\n\n### What changed\n- Updated locator strategies in step definitions\n- Healing history recorded in healing-history.json\n\n### How it works\n1. Cucumber tests failed with locator errors\n2. Healer captured ariaSnapshot() of the failing page\n3. LLM suggested new user-facing locators\n4. Fix applied and tests re-run successfully\n\n> This PR was created automatically by the Agentic QA Pipeline.\"
              }"
            
            echo "✅ PR created from branch: $BRANCH_NAME"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue for unhealable failures
        if: failure()
        run: |
          if [ ! -f ci-failure-report.json ]; then
            echo "No failure report found, skipping issue creation"
            exit 0
          fi
          
          ERROR_TYPE=$(jq -r '.errorType' ci-failure-report.json)
          MESSAGE=$(jq -r '.message' ci-failure-report.json)
          SCENARIO=$(jq -r '.scenario' ci-failure-report.json)
          STEP=$(jq -r '.step' ci-failure-report.json)
          HEAL_ATTEMPTS=$(jq -r '.healAttempts' ci-failure-report.json)
          HEALABLE=$(jq -r '.healable' ci-failure-report.json)
          TIMESTAMP=$(jq -r '.timestamp' ci-failure-report.json)
          COMMIT_SHA="${{ github.sha }}"
          
          if [ "$HEALABLE" = "true" ]; then
            LABEL="healer-exhausted"
            TITLE="Healer exhausted: ${STEP}"
            BODY=$(printf "## Self-Healing Failed After %s Attempts\n\n**Scenario:** %s\n**Failing Step:** %s\n**Error Type:** %s\n**Timestamp:** %s\n**Commit:** %s\n\n### Error Message\n\n%s\n\n### What happened\nThe CI healer tried %s time(s) to fix this locator but the test still fails.\n\n### Suggested Actions\n- [ ] Inspect the page DOM/accessibility tree manually\n- [ ] Update the step definition with new locators\n- [ ] Consider if the test scenario needs restructuring" \
              "$HEAL_ATTEMPTS" "$SCENARIO" "$STEP" "$ERROR_TYPE" "$TIMESTAMP" "$COMMIT_SHA" "$MESSAGE" "$HEAL_ATTEMPTS")
          else
            LABEL="non-healable"
            TITLE="Non-healable test failure: ${ERROR_TYPE}"
            BODY=$(printf "## Non-Healable Test Failure\n\n**Scenario:** %s\n**Failing Step:** %s\n**Error Type:** %s\n**Timestamp:** %s\n**Commit:** %s\n\n### Error Message\n\n%s\n\n### Why it cannot be healed\nThis error type (%s) is not a locator issue and requires manual intervention.\n\n### Suggested Actions\n- [ ] Check if the site behavior or API has changed\n- [ ] Review the assertion logic in the step definition\n- [ ] Verify network/environment stability" \
              "$SCENARIO" "$STEP" "$ERROR_TYPE" "$TIMESTAMP" "$COMMIT_SHA" "$MESSAGE" "$ERROR_TYPE")
          fi
          
          curl -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "$(jq -n \
              --arg title "$TITLE" \
              --arg body "$BODY" \
              --arg label "$LABEL" \
              '{title: $title, body: $body, labels: [$label, "automated"]}')"
          
          echo "Issue created for unhealable failure"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            src/step-definitions/
            features/
            healing-history.json
            cucumber-report.html
          retention-days: 7

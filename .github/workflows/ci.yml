name: Agentic QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  e2e-test:
    name: E2E Tests + Self-Healing
    runs-on: ubuntu-latest
    needs: type-check
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run existing tests (with self-healing)
        run: npx tsx src/ci-runner.ts

      - name: Commit healed locators
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add tests/generated/ healing-history.json
            git commit -m "fix(auto): self-healed locators via CI pipeline

          Locators were automatically fixed by the Healer agent.
          See healing-history.json for details.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push
            echo "✅ Healed locators committed and pushed"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            tests/generated/
            healing-history.json
            test-results/
          retention-days: 7

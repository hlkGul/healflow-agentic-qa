name: Agentic QA Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  e2e-test:
    name: E2E Tests + Self-Healing
    runs-on: ubuntu-latest
    needs: type-check
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TEST_ENV: ${{ vars.TEST_ENV || 'prod' }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Cucumber tests (with self-healing)
        run: npx tsx src/ci-runner.ts

      - name: Create PR with healed locators
        if: success() || failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            BRANCH_NAME="fix/auto-heal-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git add src/step-definitions/ healing-history.json
            git commit -m "fix(auto): self-healed locators via CI pipeline

          Locators were automatically fixed by the Healer agent.
          See healing-history.json for details.

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "fix(auto): Self-healed broken locators" \
              --body "## 🔧 Auto-Healed Locators

          The CI pipeline detected broken locators and the Healer agent fixed them automatically.

          ### What changed
          - Updated locator strategies in step definitions
          - Healing history recorded in \`healing-history.json\`

          ### How it works
          1. Cucumber tests failed with locator errors
          2. Healer captured \`ariaSnapshot()\` of the failing page
          3. LLM suggested new user-facing locators
          4. Fix applied and tests re-run successfully

          > This PR was created automatically by the Agentic QA Pipeline." \
              --base main \
              --head "$BRANCH_NAME"
            
            echo "✅ PR created from branch: $BRANCH_NAME"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            src/step-definitions/
            features/
            healing-history.json
            cucumber-report.html
          retention-days: 7
